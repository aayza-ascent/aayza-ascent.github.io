<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aayza Ahmed — Software Engineer</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root{
    /* Dark mode default — deep aubergine base w/ candy accents */
    --cream:#0E0B1A;
    --cream-2:#151228;
    --surface:#1A1630;
    --surface-2:#221C3E;
    --ink:#F5F1EA;
    --ink-soft:#B8B0C7;
    --muted:#7A7391;
    --peri:#A78BFA;
    --blush:#FF8AB8;
    --mint:#6EE7B7;
    --lemon:#FBBF24;
    --cyan:#67E8F9;
    --accent:#FF6B9D;
    --shadow-soft: 20px 20px 50px rgba(0,0,0,.55), -8px -8px 28px rgba(167,139,250,.06);
    --shadow-inset: inset 4px 4px 10px rgba(0,0,0,.4), inset -4px -4px 10px rgba(255,255,255,.04);
    --glass: rgba(26,22,48,.55);
    --glass-border: rgba(255,255,255,.08);
    --radius: 22px;
    --gap: 28px;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--cream);color:var(--ink);font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;overflow-x:hidden;scroll-behavior:smooth}
  body{line-height:1.5}

  .serif{font-family:'Instrument Serif',serif;font-weight:400;letter-spacing:-.01em}
  .mono{font-family:'JetBrains Mono',monospace}
  em.serif{font-style:italic}

  ::selection{background:var(--peri);color:#fff}

  /* Global grain texture + subtle vignette for dark mode */
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:1000;opacity:.08;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
    mix-blend-mode:screen;
  }
  body::after{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:999;
    background:radial-gradient(circle at 50% 0%, rgba(167,139,250,.12), transparent 60%),
               radial-gradient(circle at 100% 100%, rgba(255,138,184,.08), transparent 50%);
  }

  /* Root frame */
  #root{position:relative;z-index:1}

  /* NAV */
  nav.top{
    position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:100;
    display:flex;gap:4px;padding:6px;border-radius:999px;
    background:rgba(26,22,48,.75);backdrop-filter:blur(18px) saturate(160%);
    -webkit-backdrop-filter:blur(18px) saturate(160%);
    border:.5px solid rgba(255,255,255,.1);
    box-shadow:0 10px 40px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.08);
  }
  nav.top a{
    display:inline-flex;align-items:center;gap:6px;
    padding:8px 14px;border-radius:999px;text-decoration:none;color:var(--ink-soft);
    font-size:13px;font-weight:500;transition:all .25s ease;
  }
  nav.top a:hover{background:rgba(255,255,255,.06);color:var(--ink)}
  nav.top a.active{background:linear-gradient(135deg,var(--peri),var(--accent));color:#fff;
    box-shadow:0 4px 16px rgba(167,139,250,.4)}
  nav.top .dot{width:6px;height:6px;border-radius:50%;background:currentColor;opacity:.9}

  /* Section shell */
  section{padding:120px 32px;position:relative}
  /* Make room for fixed NowPlaying strip at bottom */
  body{padding-bottom:110px}
  section#guestbook{padding-bottom:40px}
  .container{max-width:1180px;margin:0 auto}
  .eyebrow{display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;
    font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:18px}
  .eyebrow::before{content:'';width:22px;height:1px;background:currentColor;opacity:.5}
  h2.section-title{font-family:'Instrument Serif',serif;font-size:clamp(42px,6vw,76px);
    line-height:1.02;letter-spacing:-.02em;margin-bottom:8px;max-width:900px}

  /* Focus */
  :focus-visible{outline:2px solid var(--peri);outline-offset:3px;border-radius:4px}

  /* Shared neumorph card */
  .neu{
    background:linear-gradient(145deg,var(--surface),var(--cream-2));
    border-radius:var(--radius);
    box-shadow:var(--shadow-soft);
    border:.5px solid rgba(255,255,255,.06);
  }
  .glass{
    background:var(--glass);
    backdrop-filter:blur(20px) saturate(150%);
    -webkit-backdrop-filter:blur(20px) saturate(150%);
    border:.5px solid var(--glass-border);
    box-shadow:0 10px 40px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.05);
    border-radius:var(--radius);
  }

  /* Buttons */
  .btn{
    display:inline-flex;align-items:center;gap:8px;
    padding:14px 22px;border-radius:999px;border:0;cursor:pointer;
    font-family:'Inter',sans-serif;font-size:14px;font-weight:500;
    transition:all .3s cubic-bezier(.2,.8,.2,1);
  }
  .btn-primary{background:linear-gradient(135deg,var(--peri),var(--accent));color:#fff;
    box-shadow:0 8px 24px rgba(167,139,250,.35), inset 0 1px 0 rgba(255,255,255,.2)}
  .btn-primary:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(167,139,250,.5), inset 0 1px 0 rgba(255,255,255,.2)}
  .btn-ghost{background:rgba(255,255,255,.04);color:var(--ink);border:1px solid rgba(255,255,255,.1)}
  .btn-ghost:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2)}

  /* Utility */
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
  .chip{
    display:inline-flex;align-items:center;gap:6px;
    padding:5px 11px;border-radius:999px;
    background:rgba(255,255,255,.06);border:.5px solid rgba(255,255,255,.1);
    font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--ink-soft);
  }

  /* Reveal on scroll */
  .reveal{opacity:0;transform:translateY(30px);transition:opacity .9s ease, transform .9s cubic-bezier(.2,.8,.2,1)}
  .reveal.in{opacity:1;transform:translateY(0)}

  /* Hide scrollbar on horizontal scrollers */
  .no-scrollbar::-webkit-scrollbar{display:none}
  .no-scrollbar{scrollbar-width:none}

  /* Density modifiers */
  [data-density="compact"]{--gap:18px}
  [data-density="compact"] section{padding:80px 24px}
  [data-density="comfy"]{--gap:36px}
  [data-density="comfy"] section{padding:160px 40px}

  /* Motion intensity: css var controls amplitude */
  :root{--motion: 1}
  [data-motion="low"]{--motion: .35}
  [data-motion="off"]{--motion: 0}
  [data-motion="high"]{--motion: 1.4}

  @media (max-width:768px){
    section{padding:80px 20px}
    nav.top{top:12px;padding:4px}
    nav.top a{padding:7px 10px;font-size:12px}
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.01ms !important;transition-duration:.01ms !important}
  }
</style>
